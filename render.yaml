# Render blueprint for the backend + managed PostgreSQL.
# In the Render dashboard: New > Blueprint, point it at this repo.
services:
  - type: web
    name: inventory-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false # set to your deployed frontend URL
      - key: SECRET_KEY
        generateValue: true
      - key: LOW_STOCK_THRESHOLD
        value: "10"

databases:
  - name: inventory-db
    databaseName: inventory
    plan: free
